<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电子烟设计手册 - 深色科技版</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #0d1117;
  color: #c9d1d9;
  min-height: 100vh;
}
header {
  text-align: center;
  padding: 60px 0 40px;
}
h1 {
  font-size: 38px;
  font-weight: 600;
  letter-spacing: 6px;
  color: #f0f6fc;
}
.search-wrap {
  max-width: 640px;
  margin: 0 auto 52px;
  padding: 0 20px;
}
.search-box {
  width: 100%;
  height: 60px;
  background: #161b22;
  border: 2px solid #30363d;
  border-radius: 30px;
  text-align: center;
  font-size: 18px;
  color: #f0f6fc;
  outline: none;
  transition: all .2s;
}
.search-box::placeholder { color: #8b949e; }
.search-box:focus { border-color: #58a6ff; box-shadow: 0 0 0 3px rgba(88,166,255,.15); }
.divider {
  height: 1px;
  background: #30363d;
  margin: 0 32px;
}
.container {
  display: flex;
  max-width: 1200px;
  margin: 0 auto;
  min-height: 500px;
}
.sidebar {
  width: 180px;
  padding: 32px 0;
  border-right: 1px solid #30363d;
}
.cat-item {
  padding: 18px 32px;
  font-size: 16px;
  color: #8b949e;
  cursor: pointer;
  transition: all .15s;
  border-left: 3px solid transparent;
  margin: 4px 0;
}
.cat-item:hover { color: #f0f6fc; background: #161b22; }
.cat-item.active { color: #58a6ff; border-left-color: #58a6ff; background: #161b22; font-weight: 500; }
.main {
  flex: 1;
  padding: 40px 48px;
}
.empty-state {
  text-align: center;
  padding: 120px 0;
}
.empty-state p:first-child { font-size: 18px; margin-bottom: 8px; color: #f0f6fc; }
.empty-state p:last-child { color: #8b949e; }
.stats {
  display: flex;
  gap: 24px;
  justify-content: center;
  margin-top: 32px;
}
.stat { text-align: center; }
.stat .num { font-size: 28px; color: #58a6ff; font-weight: 600; }
.stat .label { font-size: 12px; color: #8b949e; margin-top: 4px; }
</style>
</head>
<body>
<header>
  <h1>电子烟设计手册</h1>
</header>
<div class="search-wrap">
  <input type="text" class="search-box" placeholder="搜索">
</div>
<div class="divider"></div>
<div class="container">
  <aside class="sidebar">
    <div class="cat-item active">结构类</div>
    <div class="cat-item">电路类</div>
    <div class="cat-item">雾化类</div>
    <div class="cat-item">外观类</div>
    <div class="cat-item">生产类</div>
  </aside>
  <main class="main">
    <div class="empty-state">
      <p>选择左侧分类，或输入关键词搜索</p>
      <p>浏览 1,112 条设计问题与规范</p>
      <div class="stats">
        <div class="stat"><div class="num">11</div><div class="label">项目</div></div>
        <div class="stat"><div class="num">18</div><div class="label">技术类别</div></div>
        <div class="stat"><div class="num">1,112</div><div class="label">问题条目</div></div>
      </div>
    </div>
  </main>
</div>
</body>
</html>
