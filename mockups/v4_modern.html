<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电子烟设计手册 - 现代卡片版</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f8fafc;
  color: #1e293b;
  min-height: 100vh;
}
.topbar {
  background: #fff;
  padding: 20px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #e2e8f0;
  position: sticky;
  top: 0;
  z-index: 10;
}
.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo {
  width: 40px; height: 40px; border-radius: 10px; background: #3b82f6;
  display: flex; align-items: center; justify-content: center; color: #fff;
  font-weight: 600; font-size: 18px;
}
.brand h1 { font-size: 22px; font-weight: 600; color: #1e293b; }
.search-wrap {
  flex: 1; max-width: 520px; margin: 0 24px;
}
.search-box {
  width: 100%; height: 44px; padding: 0 20px; border: 1px solid #e2e8f0;
  border-radius: 22px; font-size: 15px; color: #1e293b; outline: none;
  background: #f8fafc; transition: all .2s;
}
.search-box::placeholder { color: #94a3b8; }
.search-box:focus { border-color: #3b82f6; background: #fff; }
.user { font-size: 13px; color: #64748b; }
.container {
  display: flex; max-width: 1400px; margin: 0 auto; min-height: 500px; gap: 24px; padding: 24px;
}
.sidebar {
  width: 220px; padding: 0;
}
.cat-header {
  font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 12px; padding-left: 12px;
}
.cat-item {
  padding: 14px 16px; font-size: 15px; color: #475569; cursor: pointer;
  transition: all .15s; border-radius: 10px; margin-bottom: 4px;
  display: flex; align-items: center; justify-content: space-between;
}
.cat-item:hover { background: #fff; color: #1e293b; }
.cat-item.active { background: #fff; color: #3b82f6; font-weight: 600; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.cat-item .count { font-size: 12px; color: #94a3b8; font-weight: 400; }
.cat-item.active .count { color: #3b82f6; }
.main { flex: 1; padding: 0; }
.header-row {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
}
.header-row h2 { font-size: 20px; font-weight: 600; }
.filter-bar {
  display: flex; gap: 8px;
}
.filter-btn {
  padding: 6px 14px; border: 1px solid #e2e8f0; border-radius: 6px; background: #fff;
  font-size: 13px; color: #475569; cursor: pointer;
}
.filter-btn.active { background: #eff6ff; border-color: #3b82f6; color: #3b82f6; }
.cards-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 16px;
}
.card {
  background: #fff; border-radius: 12px; padding: 18px; border: 1px solid #e2e8f0;
  transition: all .15s; cursor: pointer;
}
.card:hover { border-color: #3b82f6; box-shadow: 0 4px 12px rgba(0,0,0,.05); }
.card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.proj-tag { font-size: 12px; padding: 3px 8px; border-radius: 4px; background: #eff6ff; color: #3b82f6; font-weight: 500; }
.status { font-size: 12px; padding: 3px 8px; border-radius: 4px; margin-left: auto; }
.status.closed { background: #dcfce7; color: #166534; }
.status.open { background: #fef3c7; color: #92400e; }
.card-title { font-size: 15px; color: #1e293b; line-height: 1.5; margin-bottom: 10px; }
.card-meta { font-size: 12px; color: #94a3b8; display: flex; gap: 16px; }
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">
    <div class="logo">手</div>
    <h1>电子烟设计手册</h1>
  </div>
  <div class="search-wrap">
    <input type="text" class="search-box" placeholder="搜索问题、原因、对策...">
  </div>
  <div class="user">1,112 条设计问题</div>
</div>
<div class="container">
  <aside class="sidebar">
    <div class="cat-header">技术分类</div>
    <div class="cat-item active">结构类 <span class="count">432</span></div>
    <div class="cat-item">电路类 <span class="count">186</span></div>
    <div class="cat-item">雾化类 <span class="count">298</span></div>
    <div class="cat-item">外观类 <span class="count">147</span></div>
    <div class="cat-item">生产类 <span class="count">49</span></div>
  </aside>
  <main class="main">
    <div class="header-row">
      <h2>结构类</h2>
      <div class="filter-bar">
        <button class="filter-btn active">全部</button>
        <button class="filter-btn">试产</button>
        <button class="filter-btn">实验室</button>
      </div>
    </div>
    <div class="cards-grid">
      <div class="card">
        <div class="card-header">
          <span class="proj-tag">S059</span>
          <span class="status closed">已关闭</span>
        </div>
        <div class="card-title">电极与弹簧电极装配后出现偏松、脱落，导致导通不稳定</div>
        <div class="card-meta">
          <span>TP1</span><span>2026-06-24</span><span>结构工程师</span>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <span class="proj-tag">C498</span>
          <span class="status open">跟进中</span>
        </div>
        <div class="card-title">按键装配无防呆结构，方向装反导致卡死、手感差</div>
        <div class="card-meta">
          <span>TP1</span><span>2024-08-20</span><span>结构工程师</span>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <span class="proj-tag">C550</span>
          <span class="status closed">已关闭</span>
        </div>
        <div class="card-title">调气阀拨片高低温测试后脱落，需增加定位筋</div>
        <div class="card-meta">
          <span>MP</span><span>2025-09-26</span><span>测试工程师</span>
        </div>
      </div>
    </div>
  </main>
</div>
</body>
</html>
