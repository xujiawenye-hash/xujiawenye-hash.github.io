<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电子烟设计手册 - 极简版</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #fff;
  color: #1a1a1a;
}
header {
  text-align: center;
  padding: 56px 0 40px;
}
h1 {
  font-size: 36px;
  font-weight: 600;
  letter-spacing: 4px;
  color: #111;
}
.search-wrap {
  max-width: 600px;
  margin: 0 auto 48px;
  padding: 0 20px;
}
.search-box {
  width: 100%;
  height: 56px;
  border: 2px solid #333;
  border-radius: 28px;
  text-align: center;
  font-size: 18px;
  color: #333;
  outline: none;
  transition: all .2s;
}
.search-box::placeholder { color: #999; }
.search-box:focus { border-color: #000; }
.divider {
  height: 1px;
  background: #d0d7de;
  margin: 0 32px;
}
.container {
  display: flex;
  max-width: 1200px;
  margin: 0 auto;
  min-height: 500px;
}
.sidebar {
  width: 160px;
  padding: 32px 0;
  border-right: 1px solid #d0d7de;
}
.cat-item {
  padding: 16px 32px;
  font-size: 16px;
  color: #555;
  cursor: pointer;
  transition: all .15s;
  border-left: 3px solid transparent;
}
.cat-item:hover { color: #000; background: #f6f8fa; }
.cat-item.active { color: #000; border-left-color: #333; background: #f6f8fa; font-weight: 500; }
.main {
  flex: 1;
  padding: 32px 40px;
}
.empty-state {
  text-align: center;
  padding: 120px 0;
  color: #8c959f;
}
.empty-state p:first-child { font-size: 18px; margin-bottom: 8px; color: #555; }
</style>
</head>
<body>
<header>
  <h1>电子烟设计手册</h1>
</header>
<div class="search-wrap">
  <input type="text" class="search-box" placeholder="搜索">
</div>
<div class="divider"></div>
<div class="container">
  <aside class="sidebar">
    <div class="cat-item active">结构类</div>
    <div class="cat-item">电路类</div>
    <div class="cat-item">雾化类</div>
    <div class="cat-item">外观类</div>
    <div class="cat-item">生产类</div>
  </aside>
  <main class="main">
    <div class="empty-state">
      <p>选择左侧分类，或输入关键词搜索</p>
      <p>浏览 1,112 条设计问题与规范</p>
    </div>
  </main>
</div>
</body>
</html>
