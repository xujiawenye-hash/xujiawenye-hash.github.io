<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电子烟设计手册</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f5f7fa; color: #1f2937; font-size: 14px; line-height: 1.5; min-height: 100vh;
}

.app { display: flex; height: 100vh; overflow: hidden; }

/* ── 左侧深色边栏 ── */
.sidebar {
  position: fixed; left: 0; top: 0; bottom: 0;
  width: 260px; background: #0d1117;
  display: flex; flex-direction: column; color: #e6edf3;
  border-right: 1px solid #30363d; z-index: 50;
}
.logo-area {
  padding: 18px 16px 14px; display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid #21262d;
}
.logo-icon {
  width: 34px; height: 34px; border-radius: 10px;
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  display: flex; align-items: center; justify-content: center; font-size: 18px;
}
.logo-text { flex: 1; min-width: 0; }
.logo-title { font-size: 16px; font-weight: 700; letter-spacing: .3px; }
.logo-sub { font-size: 11px; color: #8b949e; margin-top: 2px; }

.new-chat-btn {
  margin: 14px 16px; padding: 10px 14px; border-radius: 10px; border: 1px solid #30363d;
  background: #21262d; color: #e6edf3; font-size: 13px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: all .15s; font-family: inherit;
}
.new-chat-btn:hover { background: #30363d; border-color: #8b949e; }

.category-label {
  padding: 14px 16px 8px; font-size: 11px; color: #8b949e;
  text-transform: uppercase; letter-spacing: 1px; font-weight: 500;
}

.category-list {
  flex: 1; overflow-y: auto; padding: 0 10px 16px;
}
.category-item {
  padding: 10px 12px; margin: 2px 0; border-radius: 8px; cursor: pointer; font-size: 13px;
  display: flex; align-items: center; gap: 10px; color: #c9d1d9; transition: all .15s;
}
.category-item:hover { background: #161b22; color: #e6edf3; }
.category-item.active { background: #1f6feb; color: #fff; }
.category-item .icon { font-size: 15px; width: 20px; text-align: center; }
.category-item .name { flex: 1; }
.category-item .count {
  font-size: 11px; opacity: .7; background: rgba(255,255,255,.12);
  padding: 1px 6px; border-radius: 10px; min-width: 22px; text-align: center;
}
.category-item.active .count { opacity: 1; background: rgba(255,255,255,.2); }

.sidebar-footer {
  padding: 12px 16px; border-top: 1px solid #21262d;
  font-size: 11px; color: #6e7681; display: flex; justify-content: space-between;
}

/* ── 主内容区 ── */
.main {
  margin-left: 260px;
  flex: 1; display: flex; flex-direction: column; min-width: 0;
  height: 100vh; overflow: hidden;
}

.topbar {
  height: 60px; min-height: 60px; background: #fff; border-bottom: 1px solid #e5e7eb;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; gap: 12px; z-index: 20; flex-shrink: 0;
}
.topbar-left {
  display: flex; align-items: center; gap: 10px; min-width: 0;
}
.page-title {
  font-size: 16px; font-weight: 600; color: #111827; white-space: nowrap;
}
.page-sub { font-size: 12px; color: #6b7280; }

.search-wrap {
  flex: 1; max-width: 520px; position: relative;
}
.search-wrap input {
  width: 100%; height: 36px; border-radius: 18px; border: 1px solid #e5e7eb;
  background: #f3f4f6; padding: 0 16px 0 36px; font-size: 13px;
  outline: none; transition: all .15s; color: #1f2937;
}
.search-wrap input:focus {
  background: #fff; border-color: #4f46e5;
  box-shadow: 0 0 0 3px rgba(79,70,229,.08);
}
.search-wrap::before {
  content: "🔍"; position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%); font-size: 13px; opacity: .5;
}

.topbar-right {
  display: flex; align-items: center; gap: 8px;
}
.view-btn {
  padding: 6px 12px; border-radius: 6px; border: 1px solid #e5e7eb;
  background: #fff; color: #374151; font-size: 12px; cursor: pointer; font-family: inherit;
}
.view-btn:hover { border-color: #d1d5db; }

/* ── 内容区 ── */
.content {
  flex: 1; overflow-y: auto; padding: 0 32px 100px; background: #f5f7fa;
}

.hero {
  text-align: center; padding: 64px 0 32px; max-width: 720px; margin: 0 auto;
}
.hero h1 {
  font-size: 32px; font-weight: 700; color: #111827; margin-bottom: 10px;
}
.hero p {
  font-size: 15px; color: #6b7280; margin-bottom: 32px;
}
.hero .stats {
  display: flex; justify-content: center; gap: 40px;
}
.hero .stat {
  text-align: center; background: #fff; padding: 20px 32px; border-radius: 14px;
  border: 1px solid #e5e7eb; box-shadow: 0 1px 3px rgba(0,0,0,.04); min-width: 120px;
}
.hero .stat-num {
  font-size: 36px; font-weight: 700; color: #4f46e5; line-height: 1.1;
}
.hero .stat-label {
  font-size: 12px; color: #9ca3af; margin-top: 6px; letter-spacing: .5px;
}

/* 筛选行 */
.filter-row {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; align-items: center;
}
.filter-row .label {
  font-size: 11px; color: #6b7280; margin-right: 2px; font-weight: 500;
}
.filter-chip {
  padding: 3px 9px; border-radius: 12px; border: 1px solid #e5e7eb; background: #fff;
  color: #6b7280; font-size: 11px; cursor: pointer; transition: all .15s; font-family: inherit;
}
.filter-chip:hover { border-color: #d1d5db; color: #374151; }
.filter-chip.active {
  background: #eef2ff; border-color: #4f46e5; color: #4f46e5; font-weight: 500;
}

/* 子分类 */
.subcats {
  display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 6px;
}
.subcat-pill {
  padding: 3px 8px; border-radius: 10px; font-size: 11px;
  color: #6b7280; background: #fff; border: 1px solid #e5e7eb; cursor: pointer;
  transition: all .15s; font-family: inherit;
}
.subcat-pill:hover { border-color: #d1d5db; color: #374151; }
.subcat-pill.active {
  background: #eef2ff; border-color: #4f46e5; color: #4f46e5;
}

/* 结果区固定表头（来源筛选 + 子分类） */
.results-header {
  position: sticky;
  top: 0;
  margin: 0 -32px 0;
  padding: 12px 32px 8px;
  background: #f5f7fa;
  z-index: 10;
}

.result-info {
  font-size: 11px; color: #9ca3af; padding: 1px 0 1px;
}

/* 对话气泡卡片 */
.chat-list {
  max-width: 980px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px;
}

.chat-item {
  display: flex; gap: 14px; animation: fadeIn .3s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.avatar {
  width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600; color: #fff;
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
}

.bubble {
  flex: 1; min-width: 0; background: #fff; border-radius: 14px; border: 1px solid #e5e7eb;
  box-shadow: 0 1px 3px rgba(0,0,0,.04); overflow: hidden; transition: box-shadow .15s;
}
.bubble:hover { box-shadow: 0 4px 12px rgba(0,0,0,.06); }

.bubble-header {
  padding: 12px 16px 0; display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
}
.bubble-title {
  font-weight: 600; font-size: 14px; color: #111827; flex: 1; min-width: 120px;
}
.tag {
  font-size: 11px; padding: 2px 8px; border-radius: 12px; font-weight: 500; white-space: nowrap;
}
.tag-cat { background: #f3f4f6; color: #4b5563; }
.tag-source-trial { background: #d1fae5; color: #065f46; }
.tag-source-lab { background: #dbeafe; color: #1e40af; }
.tag-status-closed { background: #d1fae5; color: #065f46; }
.tag-status-follow { background: #fef3c7; color: #92400e; }
.tag-status-confirm { background: #fee2e2; color: #991b1b; }

.bubble-body {
  padding: 10px 16px 12px;
}
.bubble-desc {
  font-size: 14px; color: #374151; line-height: 1.65;
}
.bubble-meta {
  font-size: 12px; color: #9ca3af; margin-top: 8px; display: flex; gap: 16px; flex-wrap: wrap;
}

.bubble-detail {
  border-top: 1px solid #f3f4f6; padding: 12px 16px; background: #fafafa;
  font-size: 13px; color: #4b5563; display: block;
}
.bubble-detail-row {
  margin-bottom: 10px;
}
.bubble-detail-row:last-child { margin-bottom: 0; }
.bubble-detail-row .label {
  font-weight: 600; color: #111827; display: block; margin-bottom: 3px; font-size: 12px;
}

.action-btn:hover { background: #f9fafb; color: #374151; }

.empty-result {
  text-align: center; padding: 60px 20px; color: #9ca3af;
}
.empty-result .icon { font-size: 48px; margin-bottom: 12px; opacity: .5; }
.empty-result p { font-size: 14px; }

/* 分页 */
.pagination {
  display: flex; align-items: center; justify-content: center; gap: 4px; padding: 28px 0 16px;
}
.pagination .info {
  font-size: 12px; color: #9ca3af; margin-right: 10px;
}
.page-btn {
  padding: 6px 11px; border: 1px solid #e5e7eb; border-radius: 6px; background: #fff;
  color: #6b7280; font-size: 12px; cursor: pointer; transition: all .15s; font-family: inherit;
}
.page-btn:hover:not(:disabled):not(.active) { border-color: #4f46e5; color: #4f46e5; }
.page-btn:disabled { opacity: .4; cursor: default; }
.page-btn.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }

/* 底部输入栏 */
.bottom-bar {
  position: fixed; bottom: 0; left: 260px; right: 0; padding: 12px 24px 16px;
  background: #f5f7fa; display: flex; justify-content: center; z-index: 30;
  border-top: 1px solid transparent;
}
.input-box {
  width: 100%; max-width: 860px; background: #fff; border: 1px solid #e5e7eb;
  border-radius: 20px; display: flex; align-items: center;
  padding: 8px 10px 8px 14px; box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
.input-box input {
  flex: 1; border: none; outline: none; padding: 6px 10px; font-size: 14px; color: #1f2937;
}
.input-box .hint {
  font-size: 12px; color: #9ca3af; margin-right: 10px; white-space: nowrap;
}
.send-btn {
  width: 32px; height: 32px; border-radius: 50%; border: none;
  background: #4f46e5; color: #fff; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background .15s; font-size: 14px;
}
.send-btn:hover { background: #4338ca; }

/* 移动端 */
.mobile-menu-btn {
  display: none; padding: 6px 10px; border-radius: 6px; border: 1px solid #e5e7eb;
  background: #fff; cursor: pointer; font-size: 16px;
}
.sidebar-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
  z-index: 90;
}
.sidebar-overlay.show { display: block; }

@media (max-width: 860px) {
  .sidebar {
    position: fixed; left: -260px; top: 0; bottom: 0; z-index: 100; width: 260px;
    transition: left .25s ease; background: #0d1117; border-right: 1px solid #30363d;
  }
  .sidebar.open { left: 0; }
  .main { margin-left: 0; width: 100%; }
  .topbar { padding: 0 16px; }
  .mobile-menu-btn { display: flex; }
  .search-wrap { max-width: 180px; }
  .search-wrap input { padding: 0 12px 0 30px; }
  .page-sub { display: none; }
  .content { padding: 0 16px 100px; }
  .results-header { margin: 0 -16px 0; padding: 10px 16px 6px; }
  .hero { padding: 56px 0 32px; }
  .bottom-bar { left: 0; }
  .hero .stats { flex-direction: column; align-items: center; gap: 12px; }
  .hero .stat { width: 100%; max-width: 240px; }
  .bubble-header { gap: 5px; }
  .bubble-title { min-width: 200px; width: 100%; }
  .filter-row { margin-bottom: 12px; }
  .filter-row .label { display: none; }
}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- 左侧深色边栏 -->
  <aside class="sidebar" id="sidebar">
    <div class="logo-area">
      <div class="logo-icon">🧭</div>
      <div class="logo-text">
        <div class="logo-title">电子烟设计手册</div>
        <div class="logo-sub">跨项目避坑经验库</div>
      </div>
    </div>

    <button class="new-chat-btn" onclick="resetAll()">
      <span>❁</span> 查看全部问题
    </button>

    <div class="category-label">技术分类</div>
    <div class="category-list" id="categoryList">
      <div class="category-item active" data-broad="" onclick="selectBroadCat(this, '')">
        <span class="icon">☆</span>
        <span class="name">全部</span>
        <span class="count">1112</span>
      </div>
    </div>

    <div class="sidebar-footer">
      <span>v3.0</span>
      <span id="totalCount">1112 条问题</span>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <!-- 主内容区 -->
  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
        <div>
          <div class="page-title" id="pageTitle">全部问题</div>
          <div class="page-sub" id="pageSub">1112 条 · 覆盖 11 个项目</div>
        </div>
      </div>
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="搜索问题描述、原因、对策…" autocomplete="off">
      </div>
      <div class="topbar-right">
        <button class="view-btn" id="filterBtn" onclick="showFilterDropdown()">筛选 ▼</button>
      </div>
    </header>

    <div class="content">
      <div class="hero" id="hero">
        <h1>电子烟设计手册</h1>
        <p>按技术类别整理的跨项目避坑经验 · 沉淀 1112 条实战问题</p>
        <div class="stats">
          <div class="stat"><div class="stat-num">11</div><div class="stat-label">覆盖项目</div></div>
          <div class="stat"><div class="stat-num">5</div><div class="stat-label">技术大类</div></div>
          <div class="stat"><div class="stat-num">1112</div><div class="stat-label">问题条目</div></div>
        </div>
      </div>

      <div id="resultsArea" style="display: none;">
        <div class="results-header">
          <div class="filter-row">
            <span class="label">来源：</span>
            <span class="filter-chip active" data-source="" onclick="filterSource(this, '')">全部</span>
            <span class="filter-chip" data-source="试产验证" onclick="filterSource(this, '试产验证')">试产验证</span>
            <span class="filter-chip" data-source="实验室测试" onclick="filterSource(this, '实验室测试')">实验室测试</span>
          </div>

          <div class="subcats" id="subcatsRow"></div>
          <div class="result-info" id="resultInfo"></div>
        </div>

        <div class="chat-list" id="chatList"></div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>

    <div class="bottom-bar">
      <div class="input-box">
        <input type="text" id="bottomInput" placeholder="输入关键词搜索，或选择左侧分类浏览…">
        <span class="hint">按 / 聚焦搜索</span>
        <button class="send-btn" onclick="searchFromBottom()">➤</button>
      </div>
    </div>
  </main>
</div>

const DETAIL_IN_BROAD = {"结构类": {"装配/治具/工序": 114, "组装/压合": 107, "调气阀/拨片": 17, "芯子/包棉/发热丝": 8, "主板/PCBA": 39, "ID/结构设计": 85, "油仓/注油": 10, "调油/油品": 1, "电池/线材焊接": 14, "硅胶/密封垫": 16, "电极/弹簧电极": 42, "按键": 42, "包装": 4, "磁铁": 27, "外观/来料不良": 9, "温升/可靠性": 2}, "雾化类": {"硅胶/密封垫": 102, "装配/治具/工序": 24, "ID/结构设计": 34, "芯子/包棉/发热丝": 56, "油仓/注油": 78, "组装/压合": 110, "电池/线材焊接": 11, "调气阀/拨片": 10, "主板/PCBA": 6, "调油/油品": 1, "磁铁": 4, "温升/可靠性": 9, "包装": 2}, "生产类": {"其他": 259, "组装/压合": 47, "温升/可靠性": 6, "ID/结构设计": 1, "调油/油品": 1, "主板/PCBA": 1}, "电路类": {"电池/线材焊接": 102, "组装/压合": 74, "主板/PCBA": 76, "ID/结构设计": 19, "USB/接口": 6, "装配/治具/工序": 25, "油仓/注油": 4, "硅胶/密封垫": 1, "包装": 1, "芯子/包棉/发热丝": 2, "磁铁": 9, "温升/可靠性": 2}, "外观类": {"外观/来料不良": 202, "硅胶/密封垫": 23, "油仓/注油": 35, "主板/PCBA": 37, "组装/压合": 22, "电池/线材焊接": 35, "ID/结构设计": 22, "调气阀/拨片": 10, "USB/接口": 7, "装配/治具/工序": 10, "芯子/包棉/发热丝": 2, "包装": 36, "磁铁": 9}};
const PROJECT_COUNTS = {"C498": 98, "C517": 187, "C550": 61, "C563": 75, "S036": 313, "S051": 115, "S052": 179, "S059": 75, "C559": 4, "C553": 2, "C487": 3};
const PER_PAGE = 20;

let currentBroad = '';
let currentDetail = '';
let currentSource = '';
let currentSearch = '';
let page = 1;
let debounceTimer = null;

const CAT_ICONS = {
  '结构类': '⚙', '电路类': '⚡', '雾化类': '💧',
  '外观类': '🎨', '生产类': '🏭'
};

const CAT_COLORS = {
  '结构类': '#4f46e5', '电路类': '#f59e0b', '雾化类': '#3b82f6',
  '外观类': '#ec4899', '生产类': '#10b981'
};

const PROJ_COLORS = {};
const COLORS = ['#4f46e5','#059669','#d97706','#dc2626','#7c3aed','#0891b2','#be123c','#4338ca','#65a30d','#ea580c','#2563eb'];
Object.keys(PROJECT_COUNTS).sort().forEach((p, i) => PROJ_COLORS[p] = COLORS[i % COLORS.length]);

function init() {
  const list = document.getElementById('categoryList');
  const order = ['结构类','电路类','雾化类','外观类','生产类'];
  order.forEach(bc => {
    const cnt = BROAD_COUNTS[bc] || 0;
    const div = document.createElement('div');
    div.className = 'category-item';
    div.setAttribute('data-broad', bc);
    div.onclick = function() { selectBroadCat(this, bc); };
    div.innerHTML = `<span class="icon">${CAT_ICONS[bc]}</span><span class="name">${bc}</span><span class="count">${cnt}</span>`;
    list.appendChild(div);
  });

  document.getElementById('searchInput').addEventListener('input', function() {
    currentSearch = this.value.trim();
    document.getElementById('bottomInput').value = currentSearch;
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => { page = 1; render(); }, 200);
  });

  document.getElementById('bottomInput').addEventListener('input', function() {
    currentSearch = this.value.trim();
    document.getElementById('searchInput').value = currentSearch;
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => { page = 1; render(); }, 200);
  });

  document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Escape') { e.target.value = ''; currentSearch = ''; document.getElementById('bottomInput').value = ''; render(); } });
  document.getElementById('bottomInput').addEventListener('keydown', e => { if (e.key === 'Escape') { e.target.value = ''; currentSearch = ''; document.getElementById('searchInput').value = ''; render(); } });

  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
}

function selectBroadCat(el, broad) {
  document.querySelectorAll('.category-item').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentBroad = broad;
  currentDetail = '';
  page = 1;
  toggleSidebar(false);
  render();
}

function resetAll() {
  currentBroad = '';
  currentDetail = '';
  currentSource = '';
  currentSearch = '';
  page = 1;
  document.getElementById('searchInput').value = '';
  document.getElementById('bottomInput').value = '';
  document.querySelectorAll('.category-item').forEach(c => c.classList.remove('active'));
  document.querySelector('.category-item[data-broad=""]').classList.add('active');
  render();
}

function filterSource(el, src) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentSource = src;
  page = 1;
  render();
}

function selectDetailCat(dc) {
  currentDetail = (currentDetail === dc) ? '' : dc;
  page = 1;
  render();
}

function render() {
  const isSearching = !!currentSearch;
  const showResults = currentBroad || isSearching;
  document.getElementById('hero').style.display = showResults ? 'none' : 'block';
  document.getElementById('resultsArea').style.display = showResults ? 'block' : 'none';

  if (!showResults) {
    document.getElementById('pageTitle').textContent = '全部问题';
    document.getElementById('pageSub').textContent = `${ALL.length} 条 · 覆盖 ${Object.keys(PROJECT_COUNTS).length} 个项目`;
    return;
  }

  // Filter
  let filtered = ALL;
  if (currentBroad) filtered = filtered.filter(i => i.broad_cat === currentBroad);
  if (currentDetail) filtered = filtered.filter(i => (i.categories || []).includes(currentDetail));
  if (currentSource) filtered = filtered.filter(i => i.source === currentSource);
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    filtered = filtered.filter(i =>
      (i.desc || '').toLowerCase().includes(q) ||
      (i.reason || '').toLowerCase().includes(q) ||
      (i.solution || '').toLowerCase().includes(q) ||
      (i.plan || '').toLowerCase().includes(q) ||
      (i.process || '').toLowerCase().includes(q) ||
      (i.material || '').toLowerCase().includes(q) ||
      (i.project || '').toLowerCase().includes(q) ||
      (i.stage || '').toLowerCase().includes(q)
    );
  }

  // Title
  if (currentBroad) {
    document.getElementById('pageTitle').textContent = `${CAT_ICONS[currentBroad]} ${currentBroad}`;
  } else {
    document.getElementById('pageTitle').textContent = '搜索结果';
  }
  document.getElementById('pageSub').textContent = `${filtered.length} 条匹配 · 共 ${ALL.length} 条`;
  document.getElementById('resultInfo').textContent = `共 ${filtered.length} 条记录` + (currentDetail ? ` · 当前分类：${currentDetail}` : '');

  // Subcats
  if (currentBroad) {
    const dm = DETAIL_IN_BROAD[currentBroad] || {};
    const sorted = Object.entries(dm).sort((a, b) => b[1] - a[1]);
    let subhtml = '';
    sorted.forEach(([k, v]) => {
      const active = currentDetail === k ? ' active' : '';
      subhtml += `<button class="subcat-pill${active}" onclick="selectDetailCat('${escAttr(k)}')">${k} <span style="opacity:.6">${v}</span></button>`;
    });
    document.getElementById('subcatsRow').innerHTML = subhtml;
  } else {
    document.getElementById('subcatsRow').innerHTML = '';
  }

  renderChat(filtered);
}

function renderChat(filtered) {
  const pages = Math.ceil(filtered.length / PER_PAGE) || 1;
  if (page > pages) page = pages;
  if (page < 1) page = 1;
  const start = (page - 1) * PER_PAGE;
  const slice = filtered.slice(start, start + PER_PAGE);

  let html = '';
  if (slice.length === 0) {
    html = `<div class="empty-result"><div class="icon">☁</div><p>没有匹配的问题，试试换个关键词或筛选条件</p></div>`;
  } else {
    slice.forEach((i, idx) => {
      const color = PROJ_COLORS[i.project] || '#4f46e5';
      const avatar = esc(i.project.charAt(0).toUpperCase());
      const srcClass = i.source === '实验室测试' ? 'tag-source-lab' : 'tag-source-trial';
      const stClass = statusClass(i.status);
      const stEmoji = statusEmoji(i.status);
      const cats = (i.categories || []).slice(0, 3).map(c => `<span class="tag tag-cat">${esc(c)}</span>`).join('');
      const hasDetail = i.reason || i.solution || i.plan;

      html += `<div class="chat-item">
        <div class="avatar" style="background:linear-gradient(135deg,${color},${shade(color,-20)})">${avatar}</div>
        <div class="bubble">
          <div class="bubble-header">
            <span class="bubble-title">${esc(i.project)} · ${esc(i.desc.length > 40 ? i.desc.substring(0, 40) + '...' : i.desc)}</span>
            ${cats}
            <span class="tag ${srcClass}">${esc(i.source)}</span>
            <span class="tag ${stClass}">${stEmoji} ${esc(i.status || '--')}</span>
          </div>
          <div class="bubble-body">
            <div class="bubble-desc">${esc(i.desc)}</div>
            <div class="bubble-meta">
              ${i.stage ? `<span>阶段：${esc(i.stage)}</span>` : ''}
              ${i.responsible || i.engineer ? `<span>负责人：${esc(i.responsible || i.engineer)}</span>` : ''}
              ${i.material ? `<span>物料：${esc(i.material)}</span>` : ''}
              ${i.defect_count ? `<span>数量：${esc(i.defect_count)}</span>` : ''}
            </div>
          </div>
          ${hasDetail ? `
          <div class="bubble-detail">
            ${i.reason ? `<div class="bubble-detail-row"><div class="label">原因分析</div><div>${esc(i.reason)}</div></div>` : ''}
            ${i.solution ? `<div class="bubble-detail-row"><div class="label">改善对策</div><div>${esc(i.solution)}</div></div>` : ''}
            ${i.plan ? `<div class="bubble-detail-row"><div class="label">改善计划</div><div>${esc(i.plan)}</div></div>` : ''}
          </div>` : ''}
        </div>
      </div>`;
    });
  }

  document.getElementById('chatList').innerHTML = html;
  renderPagination(filtered.length, pages);
}

function renderPagination(total, pages) {
  let phtml = '';
  if (pages > 1) {
    phtml = `<span class="info">${page}/${pages} 页 · 共 ${total} 条</span>`;
    phtml += `<button class="page-btn" onclick="goPage(1)" ${page === 1 ? 'disabled' : ''}>«</button>`;
    phtml += `<button class="page-btn" onclick="goPage(${page - 1})" ${page <= 1 ? 'disabled' : ''}>‹</button>`;
    for (let p = Math.max(1, page - 3); p <= Math.min(pages, page + 3); p++) {
      phtml += `<button class="page-btn ${p === page ? 'active' : ''}" onclick="goPage(${p})">${p}</button>`;
    }
    phtml += `<button class="page-btn" onclick="goPage(${page + 1})" ${page >= pages ? 'disabled' : ''}>›</button>`;
    phtml += `<button class="page-btn" onclick="goPage(${pages})" ${page === pages ? 'disabled' : ''}>»</button>`;
  }
  document.getElementById('pagination').innerHTML = phtml;
}

}

function goPage(p) {
  page = p;
  render();
  document.getElementById('chatList').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function searchFromBottom() {
  const v = document.getElementById('bottomInput').value.trim();
  currentSearch = v;
  document.getElementById('searchInput').value = v;
  page = 1;
  render();
}

function toggleSidebar(force) {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebarOverlay');
  if (typeof force === 'boolean') {
    sb.classList.toggle('open', force);
    ov.classList.toggle('show', force);
  } else {
    sb.classList.toggle('open');
    ov.classList.toggle('show');
  }
}

function showFilterDropdown() {
  // 移动端简化为筛选来源
  const current = document.querySelector('.filter-chip.active');
  const next = current.nextElementSibling || document.querySelector('.filter-chip[data-source=""]');
  next.click();
}

// Helpers
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function escAttr(s) {
  if (!s) return '';
  return s.replace(/'/g, "\'").replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function statusClass(s) {
  if (!s) return 'tag-status-closed';
  if (s.includes('关闭')) return 'tag-status-closed';
  if (s.includes('跟进')) return 'tag-status-follow';
  if (s.includes('确认')) return 'tag-status-confirm';
  return 'tag-status-closed';
}
function statusEmoji(s) {
  if (!s) return '●';
  if (s.includes('关闭')) return '●';
  if (s.includes('跟进')) return '◐';
  if (s.includes('确认')) return '◌';
  return '●';
}
function shade(hex, percent) {
  const num = parseInt(hex.replace('#', ''), 16);
  const amt = Math.round(2.55 * percent);
  const R = Math.max(0, Math.min(255, (num >> 16) + amt));
  const G = Math.max(0, Math.min(255, ((num >> 8) & 0x00ff) + amt));
  const B = Math.max(0, Math.min(255, (num & 0x0000ff) + amt));
  return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
}

init();
render();
</script>

</html>
